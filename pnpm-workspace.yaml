blockExoticSubdeps: true
catalogMode: prefer
cleanupUnusedCatalogs: true
minimumReleaseAge: 2880
shellEmulator: true
trustPolicy: no-downgrade

packages:
  - docs/
  - examples/*
  - packages/**

catalog:
  '@antfu/eslint-config': 7.7.3
  '@clack/prompts': 1.0.1
  '@parcel/watcher': 2.5.6
  '@types/node': 25.5.0
  '@vue/tsconfig': 0.8.1
  c12: 3.3.3
  citty: 0.2.0
  consola: 3.4.2
  discord.js: 14.25.1
  eslint: 10.1.0
  eslint-plugin-format: 2.0.1
  exsolve: 1.0.8
  husky: 9.1.7
  rolldown: 1.0.0-rc.4
  scule: 1.3.0
  tsdown: 0.21.7
  typescript: 6.0.2
  vitepress: 2.0.0-alpha.17
  vitest: 4.1.2
  vue: 3.5.28

strictDepBuilds: true
allowBuilds:
  '@parcel/watcher': false
  bufferutil: false
  esbuild: false
  utf-8-validate: false
  zlib-sync: false

verifyDepsBeforeRun: install
